<body>

<div class="container">
    <div class="header">
        <div class="icon-badge"><i class="fa-solid fa-qrcode"></i><span>FREE TOOL</span></div>
        <h1><i class="fa-solid fa-qrcode"></i> QR Code 生成器</h1>
        <p class="subtitle">自訂顏色 · 圓形 Logo · 即時生成</p>
    </div>

    <div class="two-columns">
        <div class="card">
            <div class="card-title"><i class="fa-solid fa-sliders"></i> QR Code 設定</div>
            <div class="input-group">
                <label>📝 輸入內容</label>
                <textarea id="inputText" rows="3" placeholder="貼上網址、文字、電話號碼...">https://github.com/728rabbit</textarea>
            </div>
            <div class="format-buttons">
                <button class="format-btn" onclick="setFormat('url')">🔗 網址</button>
                <button class="format-btn" onclick="setFormat('text')">📝 文字</button>
                <button class="format-btn" onclick="setFormat('phone')">📞 電話</button>
                <button class="format-btn" onclick="setFormat('email')">✉️ Email</button>
                <button class="format-btn" onclick="setFormat('sms')">💬 簡訊</button>
                <button class="format-btn" onclick="setFormat('wifi')">📶 WiFi</button>
            </div>
            <div class="color-row">
                <div class="color-item"><label>🎨 前景色</label><input type="color" id="foregroundColor" value="#1d1c1f"></div>
                <div class="color-item"><label>⬜ 背景色</label><input type="color" id="backgroundColor" value="#ffffff"></div>
            </div>
            <div class="size-slider">
                <label>📏 尺寸</label>
                <input type="range" id="sizeSlider" min="200" max="800" step="10" value="400">
                <span class="size-value"><span id="sizeValue">400</span> x <span id="sizeValue2">400</span> px</span>
            </div>
            <div class="input-group">
                <label>🖼️ 加入圓形 Logo (可選)</label>
                <div class="logo-upload" onclick="document.getElementById('logoInput').click()">
                    <i class="fa-regular fa-image"></i><p>點擊上傳圖片<br>會自動裁切為圓形</p>
                </div>
                <input type="file" id="logoInput" accept="image/*" style="display: none" onchange="handleLogoUpload(event)">
                <div id="logoPreview" class="logo-preview" style="display: none;">
                    <img id="logoImg" alt="Logo preview">
                    <div class="logo-info">
                        <span id="logoSizeInfo"></span>
                        圓形顯示 · 自動縮放
                    </div>
                    <span class="remove-logo" onclick="removeLogo()">移除</span>
                </div>
            </div>
            <button class="btn-primary" onclick="generateQR()" style="width:100%;justify-content:center;"><i class="fa-solid fa-qrcode"></i> 生成 QR Code</button>
        </div>

            <div class="card-title"><i class="fa-regular fa-eye"></i> 預覽 & 下載</div>
            <div class="qrcode-preview">
                <canvas id="qrcodeCanvas" width="300" height="300"></canvas>
            </div>
            <div class="download-buttons">
                <button class="btn-secondary" onclick="downloadPNG()"><i class="fa-regular fa-image"></i> 下載 PNG</button>
                <button class="btn-secondary" onclick="copyQRCode()"><i class="fa-regular fa-copy"></i> 複製圖片</button>
            </div>

</div>

<a href="https://wa.me/85297587491" class="whatsapp-float" target="_blank"><i class="fa-brands fa-whatsapp"></i></a>

<script>
    let currentLogo = null;
    let currentLogoFile = null;
    let currentCanvas = null;

    async function generateQR() {
        const text = document.getElementById('inputText').value.trim();
        if (!text) {
            alert('請輸入內容');
            return;
        }

        const size = parseInt(document.getElementById('sizeSlider').value);
        const fgColor = document.getElementById('foregroundColor').value;
        const bgColor = document.getElementById('backgroundColor').value;

        const canvas = document.getElementById('qrcodeCanvas');
        canvas.width = size;
        canvas.height = size;

        try {
            await QRCode.toCanvas(canvas, text, {
                width: size,
                color: {
                    dark: fgColor,
                    light: bgColor
                },
                errorCorrectionLevel: 'H'
            });

            if (currentLogo) {
                await drawCircularLogoOnCanvas(canvas, currentLogo);
            }
            
            currentCanvas = canvas;
        } catch (err) {
            console.error(err);
            alert('生成失敗：' + err.message);
        }
    }

    // 畫圓形 Logo（自動裁切圓形）
    function drawCircularLogoOnCanvas(canvas, logoImg) {
        return new Promise((resolve) => {
            const ctx = canvas.getContext('2d');
            const logoSize = canvas.width * 0.2;  // Logo 佔 QR Code 20%
            const centerX = canvas.width / 2;
            const centerY = canvas.height / 2;
            const radius = logoSize / 2;
            
            // 畫白色圓形背景（保護 QR Code 可讀性）
            ctx.save();
            ctx.beginPath();
            ctx.arc(centerX, centerY, radius + 4, 0, 2 * Math.PI);
            ctx.fillStyle = '#ffffff';
            ctx.fill();
            
            // 建立圓形裁剪區域
            ctx.save();
            ctx.beginPath();
            ctx.arc(centerX, centerY, radius, 0, 2 * Math.PI);
            ctx.clip();
            
            // 畫 Logo（自動縮放並置中）
            const sx = centerX - radius;
            const sy = centerY - radius;
            ctx.drawImage(logoImg, sx, sy, logoSize, logoSize);
            
            // 還原裁剪
            ctx.restore();
            
            // 加圓形邊框（可選）
            ctx.beginPath();
            ctx.arc(centerX, centerY, radius, 0, 2 * Math.PI);
            ctx.strokeStyle = '#e8e6f0';
            ctx.lineWidth = 1.5;
            ctx.stroke();
            
            ctx.restore();
            resolve();
        });
    }

    function handleLogoUpload(event) {
        const file = event.target.files[0];
        if (!file) return;
        
        currentLogoFile = file;
        
        const reader = new FileReader();
        reader.onload = function(e) {
            const img = new Image();
            img.onload = function() {
                currentLogo = img;
                
                // 顯示圓形預覽
                const previewImg = document.getElementById('logoImg');
                previewImg.src = e.target.result;
                
                // 顯示圖片尺寸
                const sizeInfo = document.getElementById('logoSizeInfo');
                sizeInfo.innerHTML = `${img.width} x ${img.height} px`;
                
                document.getElementById('logoPreview').style.display = 'flex';
                generateQR();
            };
            img.src = e.target.result;
        };
        reader.readAsDataURL(file);
    }

    function removeLogo() {
        currentLogo = null;
        currentLogoFile = null;
        document.getElementById('logoPreview').style.display = 'none';
        document.getElementById('logoImg').src = '';
        document.getElementById('logoInput').value = '';
        generateQR();
    }

    function setFormat(type) {
        let example = '';
        switch(type) {
            case 'url': example = 'https://github.com/728rabbit'; break;
            case 'text': example = 'Hello World! 你好世界！'; break;
            case 'phone': example = 'tel:+85212345678'; break;
            case 'email': example = 'mailto:hello@example.com'; break;
            case 'sms': example = 'sms:+85212345678?body=Hello'; break;
            case 'wifi': example = 'WIFI:T:WPA;S:MyWiFi;P:password123;;'; break;
        }
        document.getElementById('inputText').value = example;
        generateQR();
    }

    document.getElementById('sizeSlider').addEventListener('input', function() {
        const val = this.value;
        document.getElementById('sizeValue').innerText = val;
        document.getElementById('sizeValue2').innerText = val;
        generateQR();
    });

    document.getElementById('foregroundColor').addEventListener('input', () => generateQR());
    document.getElementById('backgroundColor').addEventListener('input', () => generateQR());
    document.getElementById('inputText').addEventListener('input', () => generateQR());

    function downloadPNG() {
        if (!currentCanvas) { alert('請先生成 QR Code'); return; }
        const link = document.createElement('a');
        link.download = 'qrcode.png';
        link.href = currentCanvas.toDataURL('image/png');
        link.click();
    }

    async function copyQRCode() {
        if (!currentCanvas) { alert('請先生成 QR Code'); return; }
        try {
            const blob = await new Promise(resolve => currentCanvas.toBlob(resolve));
            await navigator.clipboard.write([new ClipboardItem({ [blob.type]: blob })]);
            alert('QR Code 已複製到剪貼簿');
        } catch (err) {
            alert('複製失敗，可以試試下載圖片');
        }
    }

    window.onload = () => {
        setTimeout(generateQR, 100);
    };
</script>
</body>
